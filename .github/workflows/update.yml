name: 每30分钟抓取送花数据（北京时间整点）

on:
  schedule:
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python flower_crawler.py
        env:
          BAIDU_COOKIE: ${{ secrets.BAIDU_COOKIE }}
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/history.json docs/compare_yangbowen.json docs/index.html
          if git diff --cached --quiet; then
            echo "没有变化，无需提交"
          else
            git commit -m "自动更新数据 $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push origin main
          fi
