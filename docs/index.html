<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度送花数据看板 - 多指标趋势</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
        .container { max-width: 1600px; margin: 0 auto; }
        h2 { color: #333; border-left: 5px solid #4CAF50; padding-left: 15px; margin-bottom: 20px; }
        .rank-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .rank-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; transition: transform 0.2s; }
        .rank-card:hover { transform: translateY(-3px); }
        .rank-card h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .rank-list { list-style: none; padding: 0; margin: 10px 0; max-height: 200px; overflow-y: auto; }
        .rank-list li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .rank-number { font-weight: bold; color: #ff9800; margin-right: 8px; }
        .mini-chart { margin-top: 12px; height: 120px; position: relative; }
        canvas { width: 100% !important; height: 120px !important; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #4CAF50; color: white; cursor: pointer; }
        th:hover { background-color: #45a049; }
        .footer { margin-top: 20px; color: #666; font-size: 12px; text-align: center; }
        @media (max-width: 800px) {
            .rank-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🌸 百度送花数据看板</h2>
    <div class="rank-grid" id="rankGrid"></div>

    <h3>📋 详细数据表 (点击表头排序)</h3>
    <table id="dataTable">
        <thead>
            <tr><th data-sort="name">名字</th><th data-sort="id">ID</th><th data-sort="today_gift">今日送花</th><th data-sort="today_users">今日人数</th><th data-sort="avg">人均</th><th data-sort="total_gift">累计送花</th><th>状态</th></tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="7">加载中... ...</td></tr>
        </tbody>
    </table>
    <div class="footer" id="updateTime">等待数据...</div>
</div>

<script>
    let latestData = null;
    let historyData = null;
    let charts = {};

    // 颜色映射
    const colorMap = {
        "张桂源": "#F9E511",
        "张函瑞": "#779649",
        "王橹杰": "#4ab7cc",
        "左奇函": "#10319f",
        "左齐函": "#10319f",
        "陈奕恒": "#C1A1CA",
        "杨博文": "#F4A9AA",
        "陈浚明": "#E60012"
    };
    function getColorForName(name) {
        return colorMap[name] || `hsl(${Math.abs(name.length * 37) % 360}, 70%, 60%)`;
    }

    // 加载历史数据
    async function loadHistory() {
        try {
            const resp = await fetch('history.json?_=' + Date.now());
            if (!resp.ok) throw new Error();
            historyData = await resp.json();
        } catch(e) {
            console.warn('历史数据加载失败');
            historyData = { timestamps: [], series: {} };
        }
        renderAllMiniCharts();
    }

    // 渲染四个卡片的小折线图
    function renderAllMiniCharts() {
        if (!historyData || !historyData.timestamps || historyData.timestamps.length === 0) return;
        const timestamps = historyData.timestamps;
        const series = historyData.series;
        const names = Object.keys(series);
        // 定义四个指标
        const metrics = [
            { key: 'today_gift', title: '🏆 今日送花排名', unit: '朵', rankKey: 'today_gift' },
            { key: 'today_users', title: '👥 今日人数排名', unit: '人', rankKey: 'today_users' },
            { key: 'avg', title: '📊 人均送花排名', unit: '朵/人', rankKey: 'avg' },
            { key: 'total_gift', title: '🏆 累计送花排名', unit: '朵', rankKey: 'total_gift' }
        ];
        const grid = document.getElementById('rankGrid');
        grid.innerHTML = '';
        metrics.forEach(metric => {
            const card = document.createElement('div');
            card.className = 'rank-card';
            card.innerHTML = `
                <h3>${metric.title}</h3>
                <ol id="rank-${metric.key}" class="rank-list"></ol>
                <div class="mini-chart"><canvas id="chart-${metric.key}" width="400" height="120"></canvas></div>
            `;
            grid.appendChild(card);
            // 准备数据集
            const datasets = [];
            names.forEach(name => {
                const dataPoints = series[name][metric.key] || [];
                if (dataPoints.length === 0) return;
                datasets.push({
                    label: name,
                    data: dataPoints,
                    borderColor: getColorForName(name),
                    backgroundColor: 'transparent',
                    tension: 0.2,
                    borderWidth: 2,
                    pointRadius: 2,
                    fill: false
                });
            });
            const ctx = document.getElementById(`chart-${metric.key}`).getContext('2d');
            if (charts[metric.key]) charts[metric.key].destroy();
            charts[metric.key] = new Chart(ctx, {
                type: 'line',
                data: { labels: timestamps, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { position: 'top', labels: { boxWidth: 10, font: { size: 9 } } }, tooltip: { mode: 'index' } },
                    scales: { y: { beginAtZero: true, title: { display: false } }, x: { ticks: { maxRotation: 45, autoSkip: true, maxTicksLimit: 6 } } }
                }
            });
        });
    }

    // 加载最新数据并更新排名
    async function loadLatest() {
        try {
            const resp = await fetch('data.json?_=' + Date.now());
            if (!resp.ok) throw new Error();
            latestData = await resp.json();
            updateTableAndRanks();
            document.getElementById('updateTime').innerHTML = `最后更新: ${new Date().toLocaleString()}`;
        } catch(e) {
            console.error(e);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="7">暂无数据，请等待自动抓取</td></tr>';
        }
    }

    function updateTableAndRanks() {
        if (!latestData) return;
        // 更新表格
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        latestData.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.name}</td><td>${item.id}</td><td>${item.today_gift}</td>
                    <td>${item.today_users}</td><td>${item.avg}</td><td>${item.total_gift}</td>
                    <td>${item.status}</td>
                </tr>`;
        });
        // 更新四个排名列表
        const metrics = [
            { key: 'today_gift', dataKey: 'today_gift', unit: '朵' },
            { key: 'today_users', dataKey: 'today_users', unit: '人' },
            { key: 'avg', dataKey: 'avg', unit: '朵/人' },
            { key: 'total_gift', dataKey: 'total_gift', unit: '朵' }
        ];
        metrics.forEach(metric => {
            const sorted = [...latestData].sort((a,b) => b[metric.dataKey] - a[metric.dataKey]);
            const rankList = document.getElementById(`rank-${metric.key}`);
            if (!rankList) return;
            rankList.innerHTML = '';
            sorted.forEach((item, idx) => {
                rankList.innerHTML += `<li><span class="rank-number">${idx+1}.</span> ${item.name} — ${item[metric.dataKey]} ${metric.unit}</li>`;
            });
        });
    }

    function setupTableSort() {
        const ths = document.querySelectorAll('#dataTable th');
        ths.forEach(th => {
            th.addEventListener('click', () => {
                const sortKey = th.getAttribute('data-sort');
                if (!sortKey || !latestData) return;
                const sorted = [...latestData].sort((a,b) => {
                    let av = a[sortKey], bv = b[sortKey];
                    if (typeof av === 'string') return av.localeCompare(bv);
                    return bv - av;
                });
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                sorted.forEach(item => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${item.name}</td><td>${item.id}</td><td>${item.today_gift}</td>
                            <td>${item.today_users}</td><td>${item.avg}</td><td>${item.total_gift}</td>
                            <td>${item.status}</td>
                        </tr>`;
                });
            });
        });
    }

    window.onload = async () => {
        await loadHistory();
        await loadLatest();
        setupTableSort();
        setInterval(loadLatest, 60000);
        // 每10分钟重新加载历史数据（如果有新点）
        setInterval(async () => {
            await loadHistory();
        }, 600000);
    };
</script>
</body>
</html>
