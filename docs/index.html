<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度送花数据看板 - 趋势与对比</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
        .container { max-width: 1400px; margin: 0 auto; }
        h2 { color: #333; border-left: 5px solid #4CAF50; padding-left: 15px; margin-bottom: 20px; }
        h3 { margin: 20px 0 10px 0; color: #2c3e50; }
        .compare-box { background: white; border-radius: 12px; padding: 15px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .compare-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .compare-table th, .compare-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .compare-table th { background-color: #2196F3; color: white; }
        .rank-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .rank-card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; transition: transform 0.2s; }
        .rank-card:hover { transform: translateY(-3px); }
        .rank-card h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .rank-list { list-style: none; padding: 0; margin: 10px 0; max-height: 200px; overflow-y: auto; }
        .rank-list li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
        .rank-number { font-weight: bold; color: #ff9800; margin-right: 8px; }
        .mini-chart { margin-top: 12px; height: 120px; position: relative; }
        canvas { width: 100% !important; height: 120px !important; }
        table.data-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .data-table th { background-color: #4CAF50; color: white; cursor: pointer; }
        .data-table th:hover { background-color: #45a049; }
        /* 名字列颜色 + 行悬浮浅色背景 */
        .data-table td:first-child { font-weight: bold; }
        .data-table tr:hover td:first-child { filter: brightness(0.9); }
        .footer { margin-top: 20px; color: #666; font-size: 12px; text-align: center; }
        @media (max-width: 800px) {
            .rank-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🌸 百度送花数据看板</h2>

    <!-- 杨博文对比表格 -->
    <div class="compare-box" id="compareContainer">
        <h3>📊 杨博文 - 今天 vs 昨天（同一时段）数据对比</h3>
        <div id="compareTable">加载中...</div>
    </div>

    <div class="rank-grid" id="rankGrid"></div>

    <h3>📋 详细数据表 (点击表头排序)</h3>
    <table class="data-table" id="dataTable">
        <thead>
            <tr><th data-sort="name">名字</th><th data-sort="today_gift">今日送花</th><th data-sort="today_users">今日人数</th><th data-sort="avg">人均</th><th data-sort="total_gift">累计送花</th></tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="5">加载中......</td></tr>
        </tbody>
    </table>
    <div class="footer" id="updateTime">等待数据...</div>
</div>

<script>
    let latestData = null;
    let historyData = null;
    let compareData = null;
    let charts = {};

    // 颜色映射（文字颜色）
    const colorMap = {
        "张桂源": "#F9E511",
        "张函瑞": "#779649",
        "王橹杰": "#4ab7cc",
        "左奇函": "#10319f",
        "左齐函": "#10319f",
        "陈奕恒": "#C1A1CA",
        "杨博文": "#F4A9AA",
        "陈浚明": "#E60012"
    };
    function getColorForName(name) {
        return colorMap[name] || `hsl(${Math.abs(name.length * 37) % 360}, 70%, 60%)`;
    }

    // 加载对比数据
    async function loadCompare() {
        try {
            const resp = await fetch('compare_yangbowen.json?_=' + Date.now());
            if (!resp.ok) throw new Error();
            compareData = await resp.json();
            renderCompareTable();
        } catch(e) {
            document.getElementById('compareTable').innerHTML = '<p style="color:red;">暂无对比数据，请等待自动抓取...</p>';
        }
    }

    function renderCompareTable() {
        if (!compareData) return;
        const today = compareData.today;
        const yesterday = compareData.yesterday;
        const html = `
            <table class="compare-table">
                <thead>
                    <tr><th>指标</th><th>今日 (${compareData.update_time})</th><th>昨日 (${compareData.yesterday_timestamp})</th><th>差值</th></tr>
                </thead>
                <tbody>
                    <tr><td>今日送花 (朵)</td><td>${today.today_gift}</td><td>${yesterday.today_gift}</td><td style="color: ${today.today_gift - yesterday.today_gift >= 0 ? 'green' : 'red'}">${today.today_gift - yesterday.today_gift}</td></tr>
                    <tr><td>今日人数 (人)</td><td>${today.today_users}</td><td>${yesterday.today_users}</td><td style="color: ${today.today_users - yesterday.today_users >= 0 ? 'green' : 'red'}">${today.today_users - yesterday.today_users}</td></tr>
                    <tr><td>人均 (朵/人)</td><td>${today.avg}</td><td>${yesterday.avg}</td><td style="color: ${today.avg - yesterday.avg >= 0 ? 'green' : 'red'}">${(today.avg - yesterday.avg).toFixed(2)}</td></tr>
                </tbody>
            </table>
        `;
        document.getElementById('compareTable').innerHTML = html;
    }

    // 加载历史数据
    async function loadHistory() {
        try {
            const resp = await fetch('history.json?_=' + Date.now());
            if (!resp.ok) throw new Error();
            historyData = await resp.json();
        } catch(e) {
            console.warn('历史数据加载失败');
            historyData = { timestamps: [], series: {} };
        }
        renderAllMiniCharts();
    }

    function renderAllMiniCharts() {
        if (!historyData || !historyData.timestamps || historyData.timestamps.length === 0) return;
        const timestamps = historyData.timestamps;
        const series = historyData.series;
        const names = Object.keys(series);
        const metrics = [
            { key: 'today_gift', title: '🏆 今日送花排名', unit: '朵', rankKey: 'today_gift' },
            { key: 'today_users', title: '👥 今日人数排名', unit: '人', rankKey: 'today_users' },
            { key: 'avg', title: '📊 人均送花排名', unit: '朵/人', rankKey: 'avg' },
            { key: 'total_gift', title: '🏆 累计送花排名', unit: '朵', rankKey: 'total_gift' }
        ];
        const grid = document.getElementById('rankGrid');
        grid.innerHTML = '';
        metrics.forEach(metric => {
            const card = document.createElement('div');
            card.className = 'rank-card';
            card.innerHTML = `
                <h3>${metric.title}</h3>
                <ol id="rank-${metric.key}" class="rank-list"></ol>
                <div class="mini-chart"><canvas id="chart-${metric.key}" width="400" height="120"></canvas></div>
            `;
            grid.appendChild(card);
            const datasets = [];
            names.forEach(name => {
                const dataPoints = series[name][metric.key] || [];
                if (dataPoints.length === 0) return;
                datasets.push({
                    label: name,
                    data: dataPoints,
                    borderColor: getColorForName(name),
                    backgroundColor: 'transparent',
                    tension: 0.2,
                    borderWidth: 2,
                    pointRadius: 2,
                    fill: false
                });
            });
            const ctx = document.getElementById(`chart-${metric.key}`).getContext('2d');
            if (charts[metric.key]) charts[metric.key].destroy();
            charts[metric.key] = new Chart(ctx, {
                type: 'line',
                data: { labels: timestamps, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { position: 'top', labels: { boxWidth: 10, font: { size: 9 } } }, tooltip: { mode: 'index' } },
                    scales: { y: { beginAtZero: true, title: { display: false } }, x: { ticks: { maxRotation: 45, autoSkip: true, maxTicksLimit: 6 } } }
                }
            });
        });
    }

    // 加载最新数据并更新表格、排名
    async function loadLatest() {
        try {
            const resp = await fetch('data.json?_=' + Date.now());
            if (!resp.ok) throw new Error();
            latestData = await resp.json();
            updateTableAndRanks();
            document.getElementById('updateTime').innerHTML = `最后更新: ${new Date().toLocaleString()}`;
        } catch(e) {
            console.error(e);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5">暂无数据，请等待自动抓取</td></tr>';
        }
    }

    function updateTableAndRanks() {
        if (!latestData) return;
        // 更新表格（名字列应用专属颜色）
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        latestData.forEach(item => {
            const color = getColorForName(item.name);
            const row = document.createElement('tr');
            // 名字列
            const nameCell = document.createElement('td');
            nameCell.textContent = item.name;
            nameCell.style.color = color;
            nameCell.style.fontWeight = 'bold';
            row.appendChild(nameCell);
            // 其他列
            const giftCell = document.createElement('td');
            giftCell.textContent = item.today_gift;
            row.appendChild(giftCell);
            const usersCell = document.createElement('td');
            usersCell.textContent = item.today_users;
            row.appendChild(usersCell);
            const avgCell = document.createElement('td');
            avgCell.textContent = item.avg;
            row.appendChild(avgCell);
            const totalCell = document.createElement('td');
            totalCell.textContent = item.total_gift;
            row.appendChild(totalCell);
            // 鼠标悬浮行背景色（浅色）
            row.addEventListener('mouseenter', () => {
                row.style.backgroundColor = color + '20'; // 16%透明度
            });
            row.addEventListener('mouseleave', () => {
                row.style.backgroundColor = '';
            });
            tbody.appendChild(row);
        });

        // 更新四个排名列表
        const metrics = [
            { key: 'today_gift', dataKey: 'today_gift', unit: '朵' },
            { key: 'today_users', dataKey: 'today_users', unit: '人' },
            { key: 'avg', dataKey: 'avg', unit: '朵/人' },
            { key: 'total_gift', dataKey: 'total_gift', unit: '朵' }
        ];
        metrics.forEach(metric => {
            const sorted = [...latestData].sort((a,b) => b[metric.dataKey] - a[metric.dataKey]);
            const rankList = document.getElementById(`rank-${metric.key}`);
            if (!rankList) return;
            rankList.innerHTML = '';
            sorted.forEach((item, idx) => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="rank-number">${idx+1}.</span> <span style="color:${getColorForName(item.name)}">${item.name}</span> — ${item[metric.dataKey]} ${metric.unit}`;
                rankList.appendChild(li);
            });
        });
    }

    function setupTableSort() {
        const ths = document.querySelectorAll('#dataTable th');
        ths.forEach(th => {
            th.addEventListener('click', () => {
                const sortKey = th.getAttribute('data-sort');
                if (!sortKey || !latestData) return;
                const sorted = [...latestData].sort((a,b) => {
                    let av = a[sortKey], bv = b[sortKey];
                    if (typeof av === 'string') return av.localeCompare(bv);
                    return bv - av;
                });
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                sorted.forEach(item => {
                    const color = getColorForName(item.name);
                    const row = document.createElement('tr');
                    const nameCell = document.createElement('td');
                    nameCell.textContent = item.name;
                    nameCell.style.color = color;
                    nameCell.style.fontWeight = 'bold';
                    row.appendChild(nameCell);
                    const giftCell = document.createElement('td'); giftCell.textContent = item.today_gift; row.appendChild(giftCell);
                    const usersCell = document.createElement('td'); usersCell.textContent = item.today_users; row.appendChild(usersCell);
                    const avgCell = document.createElement('td'); avgCell.textContent = item.avg; row.appendChild(avgCell);
                    const totalCell = document.createElement('td'); totalCell.textContent = item.total_gift; row.appendChild(totalCell);
                    row.addEventListener('mouseenter', () => { row.style.backgroundColor = color + '20'; });
                    row.addEventListener('mouseleave', () => { row.style.backgroundColor = ''; });
                    tbody.appendChild(row);
                });
            });
        });
    }

    window.onload = async () => {
        await loadHistory();
        await loadLatest();
        await loadCompare();
        setupTableSort();
        setInterval(loadLatest, 60000);      // 每分钟刷新最新数据
        setInterval(loadCompare, 60000);     // 每分钟刷新对比
        setInterval(async () => { await loadHistory(); }, 600000); // 每10分钟刷新历史
    };
</script>
</body>
</html>
